<!doctype html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>aramizkingh linktree</title>
        <!--style.css link-->
        <link rel="stylesheet" href="style.css">
        <!--font awesome link(icons)-->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    </head>
    <body>
        <div class="myView">
            <!--header section-->
            <header>
                <button onclick="toggleMode()">ToggleMode</button><br>
                <img src="image/myphoto.jpeg" alt="profile photo">
                <h1>Aramizkingh</h1>
                <h3>Full Stack Developer</h3>
                <p id="pa">I build clean, responsive and interactive web experiences</p>
            </header>
            <!--link section-->
            <div class="link">
            <a href="https://github.com" target="_blank" rel="noopener noreferrer" id="github"><i class="fab fa-github" id="git"></i> GitHub</a>
            <a href="https://LinkedIn.com" target="_blank" rel="noopener noreferrer" id="LinkedIn"><i class="fab fa-linkedin" id="lin"></i> LinkedIn</a>
            <a href="https://instagram.com" target="_blank" rel="noopener noreferrer" id="instagram"><i class="fab fa-instagram" id="ins"></i>instagram</a>
            <a href="https://youtube.com" target="_blank" rel="noopener noreferrer" id="youtube"><i class="fab fa-youtube" id="you"></i> youTube</a>
            <a href="#" target="_blank" rel="noopener noreferrer" id="MyProjects"><i class="fas fa-laptop-code" id="MyP"></i>My Projects</a>
            <a href="#" target="_blank" rel="noopener noreferrer" id="contactMe"><i class="fas fa-envelope" id="con"></i>Contact Me</a>
            </div>
            <!--footer section-->
            <p id="findMe">Find me on</p>
            <div class="findMe">
                <i class="fab fa-github" id="hub"></i>
                <i class="fab fa-linkedin" id="din"></i>
                <i class="fab fa-instagram" id="ram"></i>
                <i class="fab fa-youtube" id="ube"></i>
                <i class="fab fa-twitter" id="ter"></i>
                <br>
                <footer>
                &copy 2026 Aramizkingh. All rights reserved.
                </footer>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
